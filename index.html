const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryOpen(pass){try{
const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),
"PBKDF2",false,["deriveKey"]);
const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),
iterations:310000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,
["decrypt"]);
const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},k,
b64(DATA.ct));
localStorage.setItem("hermes_pass",pass);
document.open();document.write(new TextDecoder().decode(pt));document.close();
return true}catch(e){return false}}
(async()=>{const s=localStorage.getItem("hermes_pass");
if(s&&await tryOpen(s))return;
const f=document.getElementById("f"),p=document.getElementById("p"),
m=document.getElementById("msg");f.style.visibility="visible";p.focus();
f.addEventListener("submit",async ev=>{ev.preventDefault();
m.textContent="\u2026";
m.textContent=(await tryOpen(p.value))?"":"wrong passphrase"})})();
</script></body></html>
